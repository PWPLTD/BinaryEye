name: Build ODK-Compatible BinaryEye

on:
  schedule:
    - cron: "0 3 * * 1"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout fork
        uses: actions/checkout@v4
        with:
          ref: odk-support
          fetch-depth: 0

      - name: Add upstream remote
        run: |
          git remote add upstream https://github.com/markusfisch/BinaryEye.git
          git fetch upstream
      - name: Rebase odk-support onto upstream/main
        run: |
          git checkout odk-support
          git rebase upstream/main || true
      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Resolve apksigner path
        run: |
          APKSIGNER=$(find "$ANDROID_SDK_ROOT/build-tools" -name apksigner -type f | sort -V | tail -n1)
          if [ -z "$APKSIGNER" ]; then
            echo "Could not find apksigner in Android SDK build-tools"
            exit 1
          fi
          echo "APKSIGNER=$APKSIGNER" >> "$GITHUB_ENV"

      - name: Remove release signing config
        run: |
          sed -i 's/signingConfig signingConfigs.release//g' app/build.gradle
      - name: Build release APK (unsigned)
        run: ./gradlew assembleRelease

      - name: Extract versionName
        id: version
        run: |
          VERSION=$(grep versionName app/build.gradle | sed 's/[^0-9.]//g')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
      - name: Restore signing keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > temp.keystore
      - name: Sign APK
        run: |
          for apk in app/build/outputs/apk/release/*.apk; do
            "$APKSIGNER" sign \
              --ks temp.keystore \
              --ks-pass pass:password \
              --key-pass pass:password \
              --out "${apk%.apk}-signed.apk" \
              "$apk"
          done

      - name: Rename signed APK
        run: |
          mv app/build/outputs/apk/release/*-signed.apk "app/build/outputs/apk/release/BinaryEye-ODK-${{ steps.version.outputs.version }}.apk"

      - name: Verify signature
        run: |
          for apk in app/build/outputs/apk/release/BinaryEye-ODK-*.apk; do
            "$APKSIGNER" verify "$apk"
          done
      - name: Upload signed APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: BinaryEye-ODK
          path: app/build/outputs/apk/release/BinaryEye-ODK-*.apk

      - name: Create Release
        uses: softprops/action-gh-release@v2
        if: github.ref == 'refs/heads/odk-support'
        with:
          tag_name: ${{ steps.version.outputs.version }}-odk
          name: BinaryEye ${{ steps.version.outputs.version }} (ODK build)
          files: app/build/outputs/apk/release/BinaryEye-ODK-*.apk
